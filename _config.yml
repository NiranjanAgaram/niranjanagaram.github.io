# Site Settings
locale: "en-US"
title: "Niranjan's Data Engineering Blog"
title_separator: "-"
subtitle: "Data Engineering, ML, and Analytics"
name: "Niranjan"
description: "A data engineer's journey through data pipelines, machine learning, and analytics"
url: "https://niranjan.github.io"
baseurl: ""
repository: "niranjan/niranjan.github.io"
teaser: # path of fallback teaser image

# SEO Related
google_site_verification: # Add your Google Search Console verification code
bing_site_verification: # Add Bing verification code

# Social Sharing
twitter:
  username: "your_twitter_handle"
facebook:
  username: "your_facebook"
  app_id:
  publisher:
og_image: # Open Graph default image
social:
  type: "Person"
  name: "Niranjan"
  links:
    - "https://twitter.com/your_handle"
    - "https://linkedin.com/in/your_profile"
    - "https://github.com/niranjan"

# Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-XXXXXXXXXX" # Replace with your GA4 tracking ID
    anonymize_ip: false

# Site Author
author:
  name: "Niranjan"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "Data Engineer passionate about building scalable data pipelines and ML systems"
  location: "Your Location"
  email: "your.email@example.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:your.email@example.com"
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://niranjan.github.io"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/your_handle"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/niranjan"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/your_profile"

# Site Footer
footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/your_handle"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/niranjan"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/your_profile"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: # Your timezone

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      show_date: true
      toc: true
      toc_sticky: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true